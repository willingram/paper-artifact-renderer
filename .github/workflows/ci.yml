name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.14"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      UV_PYTHON_DOWNLOADS: never

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run Ruff lint
        run: uv run --frozen ruff check .

      - name: Check Ruff formatting
        run: uv run --frozen ruff format --check .

      - name: Run tests
        run: uv run --frozen pytest

  distribution:
    name: Distribution / Ubuntu / Python 3.11
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"
      UV_PYTHON_DOWNLOADS: never

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Build wheel and source distribution
        run: uv run --frozen python -m build

      - name: Check distribution metadata
        run: uv run --frozen twine check --strict dist/*

      - name: Inspect distribution contents
        run: uv run --frozen python scripts/inspect_distribution.py dist

      - name: Create isolated wheel environment
        run: python -m venv "$RUNNER_TEMP/par-wheel-smoke"

      - name: Install wheel with runtime dependencies
        run: |
          "$RUNNER_TEMP/par-wheel-smoke/bin/python" -m pip install dist/*.whl

      - name: Smoke-test installed package outside source tree
        working-directory: ${{ runner.temp }}
        run: |
          "$RUNNER_TEMP/par-wheel-smoke/bin/par" --help
          "$RUNNER_TEMP/par-wheel-smoke/bin/par" --version
          "$RUNNER_TEMP/par-wheel-smoke/bin/paper-artifact-renderer" --help
          "$RUNNER_TEMP/par-wheel-smoke/bin/paper-artifact-renderer" --version
          "$RUNNER_TEMP/par-wheel-smoke/bin/python" -m paper_artifact_renderer --help
          "$RUNNER_TEMP/par-wheel-smoke/bin/python" -m paper_artifact_renderer --version
          "$RUNNER_TEMP/par-wheel-smoke/bin/python" -c "import pathlib, paper_artifact_renderer; p = pathlib.Path(paper_artifact_renderer.__file__).resolve(); w = pathlib.Path('${{ github.workspace }}').resolve(); assert w not in p.parents, (p, w); print(p)"
          "$RUNNER_TEMP/par-wheel-smoke/bin/par" render --job "${{ github.workspace }}/examples/minimal_job.json" --out "$RUNNER_TEMP/par-render-smoke"
          "$RUNNER_TEMP/par-wheel-smoke/bin/par" verify --out "$RUNNER_TEMP/par-render-smoke"
